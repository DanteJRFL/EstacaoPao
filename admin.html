<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin | Estação do Pão</title>
    <link rel="stylesheet" href="src/main.css">
    <link rel="stylesheet" href="src/components.css">
    <link rel="icon" type="image/x-icon" href="assets/visual-identity/logo.png">
</head>
<body>
    <div class="container">
        <h1>Gerenciar Produtos</h1>
        <form id="add-product-form" class="mt-2" style="display: flex; flex-direction: column; gap: 1rem; max-width: 500px;">
            <input type="text" id="nome" placeholder="Nome do Produto" required>
            <input type="text" id="categoria" placeholder="Categoria (ex: Pães, Cafés)" required>
            <input type="number" id="preco" placeholder="Preço" step="0.01" required>
            <textarea id="descricao" placeholder="Descrição"></textarea>
            <label><input type="checkbox" id="destaque"> É Destaque?</label>
            <button type="submit" class="btn">Adicionar Produto</button>
        </form>
    </div>
    <script type="module" src="src/admin.js"></script>
</body>
</html>
