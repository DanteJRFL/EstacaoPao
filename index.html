<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Estação do Pão - Padaria Gourmet e Cafeteria Premium">
    <title>Estação do Pão</title>
    <link rel="stylesheet" href="src/main.css">
    <link rel="stylesheet" href="src/components.css">
    <link rel="icon" type="image/x-icon" href="assets/visual-identity/logo.png">
</head>
<body>
    <header>
        <div class="logo-placeholder">
            <img
                id="main-logo"
                src="assets/visual-identity/logo_nome_png.png"
                alt="Logo da Estação do Pão">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-overlay">

                <p class="hero-subtitle">
                    Apaixonados por assar
                </p>

                <h1>
                    Estação do Pão
                </h1>

                <p class="hero-description">
                    Pães artesanais preparados diariamente com ingredientes selecionados.
                </p>

                <a href="cardapio.html" class="hero-btn">
                    Ver Cardápio
                </a>

            </div>
        </section>
        <section class="container mt-2">
            <h2 class="text-center">Nossas Especialidades</h2>
            <div class="grid" id="destaques-grid">
                <img src="img/bolo.png" alt="200px200" style="width: 100%; height: auto; border-radius: var(--radius-md);">
                <img src="img/paocaseiro.png" alt="200px200" style="width: 100%; height: auto; border-radius: var(--radius-md);">
                <img src="img/cafebonito.png" alt="200px200" style="width: 100%; height: auto; border-radius: var(--radius-md);"> 
                <img src="img/croissant.png" alt="200px200" style="width: 100%; height: auto; border-radius: var(--radius-md);">
                <img src="img/sonho.png" alt="200px200" style="width: 100%; height: auto; border-radius: var(--radius-md);">
                <img src="img/rosquinha.png" alt="200px200" style="width: 100%; height: auto; border-radius: var(--radius-md);">
                </div>
        </section>
    </main>

    <footer style="background-color: var(--brown-dark); color: var(--off-white); padding: 2rem; text-align: center; margin-top: 4rem;">
        <p>&copy; 2026 Estação do Pão. Todos os direitos reservados.</p>
    </footer>

    <script type="module" src="src/app.js"></script>
</body>
</html>
